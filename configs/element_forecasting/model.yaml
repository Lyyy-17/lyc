# 水文要素预报主模型超参数 - RTX 5090 (32GB VRAM), 92GB RAM, 25 Cores 高配版
var_names:
  - sst
  - sss
  - ssu
  - ssv

input_steps: 72
output_steps: 72

# 网络架构参数（5090 32GB 稳定版）
# 关键点：先压空间注意力显存峰值，再通过梯度累积保证有效 batch。
d_model: 160
nhead: 8
num_layers: 4
block_size: 4
dropout: 0.1
spatial_downsample: 4

# 多尺度空间分支：patch=4 主分支 + patch=8 辅助残差融合
multi_scale_enabled: false
aux_spatial_downsample: 8
multi_scale_fusion: residual_add
multi_scale_aux_weight: 0.35

# 输出细化头：减少空间过平滑
refine_head_enabled: true
refine_head_hidden_ratio: 1.5
refine_head_num_layers: 4
refine_head_residual: true

# 多周期多谐波时间编码（用于增强周期性变化建模）
periodic_periods:
  - 24.0
  - 12.0
  - 168.0
periodic_harmonics: 2
