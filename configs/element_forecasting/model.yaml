# 水文要素预报主模型超参数（Transformer + Block Attn-Res）

# 输入变量=输出变量；可改为其他任务变量，例如 [adt, ugos, vgos] 或 [u10, v10, swh, mwp, mwd]
var_names:
  - sst
  - sss
  - ssu
  - ssv

# 以时间步为单位，而非文件个数
input_steps: 72
output_steps: 72

# Transformer with Block Attn-Res
d_model: 96
nhead: 6
num_layers: 4
block_size: 4
dropout: 0.05
spatial_downsample: 2
